# =============================================================================
# Domain: Geo
# Entity: Province
# Description: First-level administrative division (provinsi) under a Country.
# =============================================================================

models:
  - name: Province
    collection: provinces
    description: "First-level administrative division (provinsi)"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique province identifier"

      name:
        type: string
        attributes: ["@required", "@max(120)"]
        description: "Province name"

      country_id:
        type: uuid
        attributes: ["@required", "@foreign_key(Country.id)"]
        description: "Owning country"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      country:
        type: Country
        attributes: ["@one", "@foreign_key(country_id)"]
        description: "Owning country"
        inverse: provinces

      cities:
        type: City[]
        attributes: ["@one_to_many"]
        description: "Cities of this province"
        inverse: province

    indexes:
      - type: index
        fields: [country_id]
      - type: index
        fields: [name]
